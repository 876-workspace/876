name: UI tests

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ui-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  component-tests:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @876/console exec vitest run --pool=forks --maxWorkers=2
      - run: pnpm --filter @876/billing-app exec vitest run --pool=forks --maxWorkers=2
      - run: pnpm --filter @876/couriers exec vitest run --pool=forks --maxWorkers=2
      - run: pnpm --filter @876/widgets exec vitest run --pool=forks --maxWorkers=2

  widget-browser:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:browser

  chromium-smoke:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - name: Run Chromium app smoke tests
        run: >-
          pnpm test:ui
          --project=console-chromium
          --project=billing-chromium
          --project=couriers-chromium
      - name: Upload browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chromium-ui-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

  cross-browser-nightly:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.13
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium firefox webkit
      - run: pnpm test:ui
      - name: Upload cross-browser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-browser-ui-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7

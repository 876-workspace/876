services:
  - type: web
    name: 876-api
    runtime: python
    rootDir: apps/api
    buildCommand: pip install .
    startCommand: python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: info
      - key: WORKOS_API_KEY
        sync: false
      - key: WORKOS_CLIENT_ID
        sync: false
      - key: WORKOS_JWKS_URL
        sync: false
      - key: API_INTERNAL_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: POSTHOG_PERSONAL_API_KEY
        sync: false
      - key: POSTHOG_PROJECT_ID
        sync: false
      - key: POSTHOG_HOST
        value: https://us.i.posthog.com

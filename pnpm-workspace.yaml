packages:
  - 'apps/*'
  - 'packages/*'

saveExact: true
savePrefix: ''
frozenLockfile: true
minimumReleaseAge: 0

overrides:
  '@hono/node-server': '1.19.13'
  postcss: '8.5.10'

# Current transitive pins from Netlify CLI and Serwist. Keep these exact so pnpm
# reports any newly introduced deprecated version while upstream migrations land.
allowedDeprecatedVersions:
  glob: '10.5.0'
  node-domexception: '1.0.0'
  source-map: '0.8.0-beta.0'

allowBuilds:
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@swc/core': true
  core-js: true
  esbuild: true
  msgpackr-extract: false
  msw: true
  netlify-cli: true
  opencode-ai: true
  prisma: true
  protobufjs: true
  sharp: false
  unix-dgram: true
  unrs-resolver: false
  vue-demi: false
  workerd: true

# Railway configuration for @876/billing-app (Billing SaaS Next.js app)
#
# IMPORTANT - Railway Dashboard Setup:
#   - Root Directory:   (leave blank so shared packages are available)
#   - Config File Path: apps/billing/railway.toml
#   - Watch Paths:      apps/billing/**, packages/**
#
# Billing owns an app-local Prisma database. BILLING_DATABASE_URL must point
# to that database; pending migrations run before each deployment starts.

[build]
builder = "RAILPACK"
buildCommand = "pnpm install --frozen-lockfile && pnpm --filter @876/sdk build && pnpm --filter @876/billing-app db:generate && pnpm --filter @876/billing-app build"

[deploy]
preDeployCommand = "pnpm --filter @876/billing-app db:deploy"
startCommand = "pnpm --filter @876/billing-app start"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

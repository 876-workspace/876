# Railway configuration for the standalone 876 Billing API.
# Root Directory must be set to: apps/billing-api

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
preDeployCommand = "python -m scripts.check_environment && python -m alembic upgrade head"
healthcheckPath = "/ready"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

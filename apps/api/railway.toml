# Railway configuration for @876/api (FastAPI)
# Root Directory in Railway dashboard must be set to: apps/api
# Railway will find this file automatically within that root.

[build]
# Use the Dockerfile for a fully reproducible Python environment
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
